<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Maskable safe zone: content within ~102px inset -->
  <rect width="512" height="512" rx="100" fill="#0d0d18"/>
  <!-- Subtle grid texture -->
  <rect x="0" y="0" width="512" height="512" rx="100" fill="url(#grid)" opacity="0.05"/>
  <!-- Gold accent bar at bottom -->
  <rect x="0" y="468" width="512" height="44" rx="0" fill="#d4a941" opacity="0.6"/>
  <!-- "CM" monogram -->
  <text
    x="256"
    y="320"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="230"
    font-weight="700"
    fill="#d4a941"
    text-anchor="middle"
    dominant-baseline="auto"
    letter-spacing="-10"
  >CM</text>
  <!-- CreatorMatch wordmark below -->
  <text
    x="256"
    y="430"
    font-family="Arial, Helvetica, sans-serif"
    font-size="36"
    font-weight="400"
    fill="#ffffff"
    text-anchor="middle"
    dominant-baseline="auto"
    letter-spacing="6"
    opacity="0.7"
  >CREATORMATCH</text>
</svg>
